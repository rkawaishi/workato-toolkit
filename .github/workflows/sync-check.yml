name: sync-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  derived-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate derived files
        run: python3 scripts/sync_derived.py
      - name: Fail if generated file drifted or generator touched frozen paths
        run: |
          git diff --exit-code -- plugin/rules/ plugin/agents/ plugin/AGENTS.md plugin/GEMINI.md CLAUDE.md \
            || { echo "::error::plugin/AGENTS.md is out of sync with plugin/rules/*.md (run 'python3 scripts/sync_derived.py' and commit), or the generator modified frozen/hand-written paths (it must not)."; exit 1; }

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python3 -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Ruff (python)
        run: ruff check scripts/ tests/ plugin/scripts/ plugin/mcp/
      - name: ShellCheck (bash hooks + scripts)
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: |
          shellcheck plugin/bin/*.sh plugin/bin/session-start-rules \
            plugin/scripts/*.sh scripts/*.sh
