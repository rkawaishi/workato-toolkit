name: sync-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  derived-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate derived files
        run: python3 scripts/sync_derived.py
      - name: Fail if generated file drifted or generator touched frozen paths
        run: |
          git diff --exit-code -- plugin/rules/ plugin/agents/ plugin/AGENTS.md plugin/GEMINI.md CLAUDE.md \
            || { echo "::error::plugin/AGENTS.md is out of sync with plugin/rules/*.md (run 'python3 scripts/sync_derived.py' and commit), or the generator modified frozen/hand-written paths (it must not)."; exit 1; }

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python3 -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Ruff (python)
        # Whole tree (opt-out): a new python directory is linted automatically.
        run: ruff check .
      - name: ShellCheck (all tracked bash scripts)
        # Discover by shebang rather than a path list, so hook scripts without
        # a .sh extension (session-start-rules) and any future script are
        # covered automatically. shellcheck is preinstalled on ubuntu runners.
        run: |
          files=$(git ls-files | while IFS= read -r f; do
            [ -f "$f" ] && head -n1 "$f" | grep -q '^#!.*bash' && printf '%s\n' "$f"
          done; true)
          echo "shellcheck targets:"; echo "$files"
          [ -n "$files" ] || { echo "::error::bash-script discovery found nothing — discovery is broken"; exit 1; }
          # shellcheck disable=SC2086  # word-splitting is intended; tracked paths contain no spaces
          shellcheck $files
