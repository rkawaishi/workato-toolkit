name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Verify tag matches plugin manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(python3 -c "import json; print(json.load(open('plugin/.claude-plugin/plugin.json'))['version'])")"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v${tag} does not match plugin.json version ${manifest} — bump plugin/.claude-plugin/plugin.json before tagging"
            exit 1
          fi
          if ! grep -q "^## \[${tag}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${tag}]' section — move the [Unreleased] content under a versioned heading before tagging"
            exit 1
          fi

      - name: Verify generated file is in sync and frozen paths untouched
        run: |
          python3 scripts/sync_derived.py
          git diff --exit-code -- plugin/rules/ plugin/agents/ plugin/AGENTS.md plugin/GEMINI.md CLAUDE.md \
            || { echo "::error::plugin/AGENTS.md is out of sync with plugin/rules/*.md (run 'python3 scripts/sync_derived.py' and commit), or the generator modified frozen/hand-written paths (it must not)."; exit 1; }

      - name: Run test suite
        run: python3 -m pytest tests/ -q

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
